<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Surprise for Orpa</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #0a0a0a;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            transition: background 1.5s ease;
        }

        /* Scanning Section */
        #scan-area { text-align: center; z-index: 100; cursor: pointer; }
        .fingerprint-icon {
            width: 80px; height: 80px;
            fill: #ff4d6d;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.7; }
        }

        /* Main Content */
        #main-content {
            display: none;
            z-index: 10; width: 85%; max-width: 350px;
            background: rgba(255, 255, 255, 0.95); padding: 25px;
            border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            text-align: center;
            animation: popUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popUp { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .main-img { 
            width: 100%; border-radius: 15px; 
            border: 3px solid #ff4d6d; margin-bottom: 15px;
            object-fit: cover; height: 250px;
        }
        h1 { color: #ff4d6d; font-size: 22px; margin-bottom: 10px; }
        
        /* Typewriter Cursor */
        #wish-text {
            font-size: 17px; color: #333; font-weight: 600;
            min-height: 60px; line-height: 1.5;
            display: inline-block;
        }
        .cursor {
            display: inline-block; width: 3px; background-color: #ff4d6d;
            margin-left: 2px; animation: blink 0.7s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Video Button Style */
        #video-btn {
            display: none;
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 15px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            transition: 0.3s;
        }
        #video-btn:active { transform: scale(0.95); }

        #surprise-video {
            display: none;
            width: 100%;
            border-radius: 15px;
            margin-top: 10px;
            border: 2px solid #ff4d6d;
        }

        .heart-bg {
            position: absolute; color: #ff4d6d;
            font-size: 20px; animation: move 4s linear infinite;
            z-index: 1; opacity: 0.6; pointer-events: none;
        }
        @keyframes move {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }
    </style>
</head>
<body onload="checkFirstTime()">

    <div id="scan-area" onclick="startScan()">
        <svg class="fingerprint-icon" viewBox="0 0 24 24">
            <path d="M17.81 4.47c-.08 0-.16-.02-.23-.06C15.66 3.42 14 3 12.01 3c-1.98 0-3.86.47-5.57 1.41-.24.13-.54.04-.67-.2-.13-.24-.04-.55.2-.68C7.82 2.52 9.86 2 12.01 2c2.13 0 3.99.47 6.03 1.56.24.13.33.43.21.67-.09.15-.24.24-.44.24zm3.04 3.03c-.11 0-.22-.03-.33-.1-.08-.05-3.32-2.16-8.51-2.16-5.2 0-8.43 2.11-8.51 2.16-.24.13-.54.06-.68-.18-.14-.24-.06-.54.18-.68.17-.1 3.61-2.3 9.01-2.3 5.4 0 8.84 2.2 9.01 2.3.24.14.32.44.18.68-.09.16-.25.28-.49.28zm-3.04 14c-.11 0-.21-.03-.31-.1-.13-.08-2.61-1.63-5.51-1.63-2.89 0-5.38 1.55-5.51 1.63-.24.13-.55.06-.69-.17-.14-.24-.06-.54.17-.68.3-.19 3.01-1.78 6.03-1.78 3.02 0 5.73 1.59 6.03 1.78.24.14.32.44.18.68-.09.17-.26.27-.4.27zM12 22c-5.52 0-10-4.48-10-10S6.48 2 12 2s10 4.48 10 10-4.48 10-10 10zm0-18c-4.41 0-8 3.59-8 8s3.59 8 8 8 8-3.59 8-8-3.59-8-8-8z"/>
        </svg>
        <p id="scan-text" style="color:#ff4d6d; font-weight:bold; margin-top:10px;">Tap to Scan Surprises...</p>
    </div>

    <div id="main-content">
        <img src="1774963235042.jpg" id="birthday-pic" class="main-img" alt="Birthday Image">
        
        <video id="surprise-video" controls>
            <source src="lv_0_20260409141139.mp4" type="video/mp4"> Your browser does not support the video tag.
        </video>

        <h1 id="title-text">Happy Birthday, Orpa! ❤️</h1>
        
        <div id="wish-container">
            <span id="wish-text"></span><span class="cursor">|</span>
        </div>

        <button id="video-btn" onclick="playMyVideo()">Tap to see Video 🎥</button>

        <p id="emoji-footer" style="font-size: 25px; margin-top: 15px;">🎂✨🎁</p>
    </div>

    <script>
        const messages = [
            " Happy Birthday, Jorda🥳🥳🥳!",
            "Duya kori allah jeno tomar shob moner asha puron kore! 😇",
            "Shobshomoy hashikhushi thako! 🥂",
            "Enjoy your day happily",
            "tumi shobshomoy amar priyo chila poroborti teo thakba.",
            "once again happy birthday jafrin ☺️",
            "lastly 😶‍🌫️ i love you 😶‍🌫️!"
        ];

        let msgIndex = 0;
        let charIndex = 0;
        const speed = 70;

        function checkFirstTime() {}

        function startScan() {
            const scanText = document.getElementById('scan-text');
            scanText.innerText = "Scanning Personality...";
            setTimeout(() => {
                showSurprise();
            }, 2500);
        }

        function showSurprise() {
            document.getElementById('scan-area').style.display = 'none';
            document.body.style.backgroundColor = '#ffeff2';
            document.getElementById('main-content').style.display = 'block';
            setInterval(createHeart, 300);
            typeWriter();
        }

        function typeWriter() {
            if (msgIndex < messages.length) {
                let currentText = messages[msgIndex];
                if (charIndex < currentText.length) {
                    document.getElementById("wish-text").innerHTML += currentText.charAt(charIndex);
                    charIndex++;
                    setTimeout(typeWriter, speed);
                } else {
                    setTimeout(() => {
                        document.getElementById("wish-text").innerHTML = "";
                        charIndex = 0;
                        msgIndex++;
                        typeWriter();
                    }, 2000);
                }
            } else {
                document.getElementById("wish-text").innerHTML = "Thank You ❤️";
                document.querySelector(".cursor").style.display = "none";
                // Show video button when typing is done
                document.getElementById("video-btn").style.display = "inline-block";
            }
        }

        function playMyVideo() {
            const video = document.getElementById('surprise-video');
            const btn = document.getElementById('video-btn');
            const bdayPic = document.getElementById('birthday-pic');
            const title = document.getElementById('title-text');

            btn.style.display = "none";
            bdayPic.style.display = "none";
            title.style.fontSize = "18px"; // Slightly shrink title to fit video
            video.style.display = "block";
            video.play();
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.classList.add('heart-bg');
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }
    </script>
</body>
</html>
